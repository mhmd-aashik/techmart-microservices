syntax = "proto3";

package product;

service ProductService {
  rpc CreateProduct (CreateProductRequest) returns (ProductResponse);
  rpc GetProducts (GetProductsRequest) returns (GetProductsResponse);
  rpc GetProductById (GetProductByIdRequest) returns (ProductResponse);
}

message Empty {}

message CreateProductRequest {
  string name = 1;
  string description = 2;
  string sku = 3;
  double price = 4;
  int32 stockQuantity = 5;
}

message ProductResponse {
  int32 id = 1;
  string name = 2;
  string description = 3;
  string sku = 4;
  double price = 5;
  int32 stockQuantity = 6;
  string createdAt = 7;
  string updatedAt = 8;
}

message GetProductsResponse {
  repeated ProductResponse products = 1;
  PaginationMeta meta = 2;

}

message GetProductByIdRequest {
  int32 id = 1;
}

message GetProductsRequest {
  int32 page = 1;
  int32 limit = 2;
  string search = 3;

  optional double minPrice = 4;
  optional double maxPrice = 5;
  optional bool inStock = 6;

  string sortBy = 7;
  string sortOrder = 8;
}

message PaginationMeta {
  int32 page = 1;
  int32 limit = 2;
  int32 totalItems = 3;
  int32 totalPages = 4;
  bool hasNextPage = 5;
  bool hasPreviousPage = 6;
}

